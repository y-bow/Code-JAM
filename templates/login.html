{% extends "base.html" %}

{% block title %}Hive | Login{% endblock %}

{% block sidebar_links %}{% endblock %}

{% block content %}
<div class="login-split-layout">
    <!-- LEFT PANEL: Abstract Background Video -->
    <div class="spline-container">
        <video autoplay muted loop playsinline class="video-background">
            <source src="https://v.ftcdn.net/03/66/59/06/700_F_366590623_I6J6OnXWq1Y8Bf5I5yv1Y1e1I1i1Y1e1_ST.mp4"
                type="video/mp4">
        </video>

        <!-- Branding Overlay -->
        <div class="spline-overlay">
            <div class="brand-group fade-up">
                <div class="logo-row">
                    <img src="{{ url_for('static', filename='images/lighttheme.png') }}" class="logo-img logo-light"
                        alt="Hive Logo">
                    <img src="{{ url_for('static', filename='images/darktheme.png') }}" class="logo-img logo-dark"
                        alt="Hive Logo">
                </div>
                <p>The smartest hive for collaborative learning.</p>
            </div>
        </div>
    </div>

    <!-- RIGHT PANEL: Login Form -->
    <div class="form-container">
        <div class="login-card-entrance">
            <div class="glass-panel login-form-card">
                <div style="text-align: center; margin-bottom: 2.5rem;">
                    <div class="mobile-logo">
                        <img src="{{ url_for('static', filename='images/lighttheme.png') }}" class="logo-img logo-light"
                            alt="Hive Logo" style="width: 140px; height: 140px;">
                        <img src="{{ url_for('static', filename='images/darktheme.png') }}" class="logo-img logo-dark"
                            alt="Hive Logo" style="width: 140px; height: 140px;">
                    </div>
                    <h2>Welcome to Hive</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to your dashboard</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}"
                    style="display: flex; flex-direction: column; gap: 1.8rem;">
                    <div class="floating-field">
                        <input type="email" id="email" name="email" required placeholder=" " autocomplete="email"
                            style="padding: 1rem 3.5rem 1rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); 
                                       background: var(--bg-main); color: var(--text-main); font-family: var(--font-body); font-size: 1rem; width: 100%;">
                        <label for="email">College Email</label>
                    </div>

                    <div class="floating-field">
                        <input type="password" id="password" name="password" required placeholder=" "
                            autocomplete="current-password"
                            style="padding: 1rem 3.5rem 1rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); 
                                       background: var(--bg-main); color: var(--text-main); font-family: var(--font-body); font-size: 1rem; width: 100%;">
                        <label for="password">Password</label>
                    </div>

                    <button type="submit" class="gradient-border btn-interact"
                        style="margin-top: 1rem; padding: 1rem; background: var(--primary-color); color: white; border: none; 
                                   border-radius: var(--radius-md); font-weight: 600; font-family: var(--font-body); font-size: 1.1rem; cursor: pointer;">
                        Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Desktop Split Layout (60/40) */
    .login-split-layout {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden !important;
        background: var(--bg-main);
        margin: 0;
        padding: 0;
    }

    /* Left Panel Styles */
    .spline-container {
        position: relative;
        width: 60%;
        height: 100%;
        background: var(--bg-main);
        overflow: hidden;
    }

    .spline-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.4));
        pointer-events: none;
        z-index: 10;
        padding: 3rem;
        display: flex;
        align-items: flex-end;
    }

    .brand-group {
        color: var(--text-main);
    }

    .logo-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.5rem;
    }

    .logo-row .material-symbols-rounded {
        font-size: 3rem;
        color: var(--primary-color);
    }

    .logo-row h1 {
        font-size: 2.5rem;
        margin: 0;
        font-family: var(--font-heading);
    }

    .brand-group p {
        font-size: 1.1rem;
        opacity: 0.8;
        font-weight: 400;
    }

    /* Right Panel Styles */
    .form-container {
        width: 40%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        z-index: 20;
    }

    .login-form-card {
        width: 100%;
        max-width: 420px;
        padding: 3rem;
        border-radius: var(--radius-lg);
    }

    .login-card-entrance {
        width: 100%;
        display: flex;
        justify-content: center;
        animation: cardEnter 0.4s ease-out forwards;
    }

    @keyframes cardEnter {
        from {
            opacity: 0;
            transform: translateX(30px);
        }

        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    /* Mobile Adaptations */
    .mobile-logo {
        display: none;
    }

    @media (max-width: 768px) {
        .spline-container {
            display: none;
        }

        .form-container {
            width: 100%;
        }

        .login-split-layout {
            background: var(--bg-main);
        }

        .mobile-logo {
            display: inline-flex;
            color: var(--primary-color);
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .login-form-card {
            border: none;
            background: transparent;
            backdrop-filter: none;
        }
    }

    /* Global page layout cleaning */
    .sidebar,
    .topbar {
        display: none !important;
    }

    .content-wrapper {
        padding: 0 !important;
        margin: 0 !important;
        width: 100vw;
        height: 100vh;
        overflow: hidden !important;
    }

    html,
    body {
        overflow: hidden !important;
        height: 100vh !important;
        width: 100vw !important;
        padding: 0 !important;
        margin: 0 !important;
        background: var(--bg-main);
    }

    .floating-field input:focus {
        animation: none !important;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1) !important;
    }
</style>
{% endblock %}
